{% extends "base.html" %}
{% block title %}Event Calendar{% endblock %}
{% block content %}
<div class="space-y-8">
    <div>
        <h1 class="font-headline text-2xl font-bold text-primary">Event Calendar</h1>
        <p class="text-on-surface-variant text-xs mt-1">Maintenance schedules, sensor events & data milestones</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- Calendar -->
        <div class="lg:col-span-8">
            <section class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_20px_40px_rgba(0,67,112,0.06)]">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="navMonth(-1)"
                        class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors p-2 rounded-lg hover:bg-primary/5">chevron_left</button>
                    <h2 id="cal-title" class="font-headline text-lg font-bold text-primary"></h2>
                    <button onclick="navMonth(1)"
                        class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors p-2 rounded-lg hover:bg-primary/5">chevron_right</button>
                </div>
                <!-- Day headers -->
                <div class="grid grid-cols-7 gap-2 mb-2">
                    <span
                        class="text-center text-[10px] font-bold text-on-surface-variant uppercase tracking-widest py-2">Mon</span>
                    <span
                        class="text-center text-[10px] font-bold text-on-surface-variant uppercase tracking-widest py-2">Tue</span>
                    <span
                        class="text-center text-[10px] font-bold text-on-surface-variant uppercase tracking-widest py-2">Wed</span>
                    <span
                        class="text-center text-[10px] font-bold text-on-surface-variant uppercase tracking-widest py-2">Thu</span>
                    <span
                        class="text-center text-[10px] font-bold text-on-surface-variant uppercase tracking-widest py-2">Fri</span>
                    <span
                        class="text-center text-[10px] font-bold text-on-surface-variant uppercase tracking-widest py-2">Sat</span>
                    <span
                        class="text-center text-[10px] font-bold text-on-surface-variant uppercase tracking-widest py-2">Sun</span>
                </div>
                <div id="full-calendar" class="grid grid-cols-7 gap-2"></div>
            </section>
        </div>

        <!-- Events Sidebar -->
        <div class="lg:col-span-4 space-y-6">
            <!-- Add Event -->
            <section class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_20px_40px_rgba(0,67,112,0.06)]">
                <h3 class="font-headline font-bold text-primary mb-4">Add Event</h3>
                <form onsubmit="addEvent(event)" class="space-y-3">
                    <input id="evt-title" type="text" placeholder="Event title" required
                        class="w-full bg-surface-container-high border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary" />
                    <input id="evt-date" type="date" required
                        class="w-full bg-surface-container-high border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary" />
                    <select id="evt-type"
                        class="w-full bg-surface-container-high border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary">
                        <option value="maintenance">🔧 Maintenance</option>
                        <option value="calibration">🎯 Calibration</option>
                        <option value="export">📊 Data Export</option>
                        <option value="alert">⚠️ Alert</option>
                    </select>
                    <button type="submit"
                        class="w-full bg-primary text-on-primary py-2 rounded-xl font-bold text-sm shadow-lg active:opacity-80 transition-all">Add
                        Event</button>
                </form>
            </section>

            <!-- Upcoming Events -->
            <section class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_20px_40px_rgba(0,67,112,0.06)]">
                <h3 class="font-headline font-bold text-primary mb-4">Upcoming Events</h3>
                <div id="event-list" class="space-y-3"></div>
            </section>

            <!-- Legend -->
            <section class="bg-surface-container-low p-5 rounded-xl border border-outline-variant/20">
                <h3 class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-3">Legend</h3>
                <div class="space-y-2">
                    <div class="flex items-center gap-2 text-xs"><span class="w-3 h-3 rounded bg-error/80"></span>
                        Maintenance</div>
                    <div class="flex items-center gap-2 text-xs"><span class="w-3 h-3 rounded bg-tertiary/80"></span>
                        Calibration</div>
                    <div class="flex items-center gap-2 text-xs"><span class="w-3 h-3 rounded bg-primary/80"></span>
                        Data Export</div>
                    <div class="flex items-center gap-2 text-xs"><span class="w-3 h-3 rounded bg-amber-500/80"></span>
                        Alert</div>
                </div>
            </section>
        </div>
    </div>
</div>

<script>
    let calDate = new Date();
    const typeColors = { maintenance: '#ba1a1a', calibration: '#004851', export: '#004370', alert: '#d97706' };
    const typeIcons = { maintenance: '🔧', calibration: '🎯', export: '📊', alert: '⚠️' };

    // Persistent events via localStorage
    let events = JSON.parse(localStorage.getItem('hydrolens_events') || '[]');

    // Seed default events if none exist
    if (events.length === 0) {
        const now = new Date();
        const y = now.getFullYear(), m = now.getMonth();
        events = [
            { title: 'ECHO-02 Maintenance', date: `${y}-${String(m + 1).padStart(2, '0')}-15`, type: 'maintenance' },
            { title: 'Monthly Data Export', date: `${y}-${String(m + 1).padStart(2, '0')}-01`, type: 'export' },
            { title: 'Sensor Calibration', date: `${y}-${String(m + 1).padStart(2, '0')}-${String(now.getDate() + 1).padStart(2, '0')}`, type: 'calibration' },
        ];
        localStorage.setItem('hydrolens_events', JSON.stringify(events));
    }

    function renderFullCalendar() {
        const grid = document.getElementById('full-calendar');
        const y = calDate.getFullYear(), m = calDate.getMonth();
        const today = new Date();

        document.getElementById('cal-title').textContent = calDate.toLocaleDateString('en', { month: 'long', year: 'numeric' });

        const firstDay = new Date(y, m, 1);
        const lastDay = new Date(y, m + 1, 0);
        let startDay = (firstDay.getDay() + 6) % 7;

        let html = '';
        const prevLast = new Date(y, m, 0).getDate();
        for (let i = startDay - 1; i >= 0; i--) {
            html += `<div class="min-h-[72px] p-1 rounded-lg bg-surface-container-low/30"><span class="text-xs text-slate-300">${prevLast - i}</span></div>`;
        }
        for (let d = 1; d <= lastDay.getDate(); d++) {
            const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
            const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const dayEvents = events.filter(e => e.date === dateStr);

            let cls = 'min-h-[72px] p-1 rounded-lg transition-colors cursor-pointer hover:bg-primary/5';
            if (isToday) cls += ' bg-primary/5 ring-1 ring-primary/20';
            else cls += ' bg-surface-container-low/50';

            let evtHtml = '';
            dayEvents.forEach(e => {
                evtHtml += `<div class="text-[8px] font-medium px-1 py-0.5 rounded mt-0.5 truncate text-white" style="background:${typeColors[e.type]}">${typeIcons[e.type]} ${e.title}</div>`;
            });

            html += `<div class="${cls}">
            <span class="text-xs ${isToday ? 'font-bold text-primary' : ''}">${d}</span>
            ${evtHtml}
        </div>`;
        }
        const totalCells = startDay + lastDay.getDate();
        const remaining = (7 - (totalCells % 7)) % 7;
        for (let i = 1; i <= remaining; i++) {
            html += `<div class="min-h-[72px] p-1 rounded-lg bg-surface-container-low/30"><span class="text-xs text-slate-300">${i}</span></div>`;
        }
        grid.innerHTML = html;
        renderEventList();
    }

    function renderEventList() {
        const list = document.getElementById('event-list');
        const sorted = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));
        const upcoming = sorted.filter(e => new Date(e.date) >= new Date(new Date().toISOString().split('T')[0]));

        if (upcoming.length === 0) {
            list.innerHTML = '<p class="text-xs text-on-surface-variant italic">No upcoming events</p>';
            return;
        }
        list.innerHTML = upcoming.map((e, i) => `
        <div class="flex gap-3 items-center">
            <div class="w-1 h-10 rounded-full flex-shrink-0" style="background:${typeColors[e.type]}"></div>
            <div class="flex-1">
                <p class="text-xs font-bold">${typeIcons[e.type]} ${e.title}</p>
                <p class="text-[10px] text-on-surface-variant">${new Date(e.date).toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' })}</p>
            </div>
            <button onclick="removeEvent(${i})" class="material-symbols-outlined text-on-surface-variant text-sm hover:text-error transition-colors">close</button>
        </div>
    `).join('');
    }

    function addEvent(e) {
        e.preventDefault();
        events.push({
            title: document.getElementById('evt-title').value,
            date: document.getElementById('evt-date').value,
            type: document.getElementById('evt-type').value
        });
        localStorage.setItem('hydrolens_events', JSON.stringify(events));
        document.getElementById('evt-title').value = '';
        renderFullCalendar();
    }

    function removeEvent(idx) {
        const sorted = [...events].sort((a, b) => new Date(a.date) - new Date(b.date));
        const upcoming = sorted.filter(e => new Date(e.date) >= new Date(new Date().toISOString().split('T')[0]));
        const toRemove = upcoming[idx];
        events = events.filter(e => !(e.title === toRemove.title && e.date === toRemove.date && e.type === toRemove.type));
        localStorage.setItem('hydrolens_events', JSON.stringify(events));
        renderFullCalendar();
    }

    function navMonth(delta) {
        calDate.setMonth(calDate.getMonth() + delta);
        renderFullCalendar();
    }

    renderFullCalendar();
</script>
{% endblock %}
