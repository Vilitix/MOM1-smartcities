{% extends "base.html" %}
{% block title %}Report Event{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto py-8">
    <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_20px_40px_rgba(0,67,112,0.06)] border border-outline-variant/20">
        <div class="flex items-center gap-4 mb-6 border-b border-slate-100 pb-6">
            <div class="w-12 h-12 bg-rose-100 rounded-xl flex items-center justify-center">
                <span class="material-symbols-outlined text-rose-600" style="font-variation-settings: 'FILL' 1;">report</span>
            </div>
            <div>
                <h1 class="font-headline text-2xl font-bold text-primary">Report an Environmental Event</h1>
                <p class="text-on-surface-variant text-sm mt-1">Submit visual or suspected occurrences of pollution, leaks, or agricultural events.</p>
            </div>
        </div>

        <form action="/api/submit-report" method="POST" id="reportForm" class="space-y-6">
            <!-- Event Type -->
            <div>
                <label for="eventType" class="block text-sm font-bold text-slate-700 mb-2">Event Type</label>
                <select id="eventType" name="eventType" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all text-slate-800 font-medium" required>
                    <option value="" disabled selected>Select an event type...</option>
                    <option value="pesticides">Spreading of Pesticides / Fertilizers</option>
                    <option value="leaks">Untreated Water Leak (Fuites d'eaux non nettoyées)</option>
                    <option value="algae">Algae Bloom</option>
                    <option value="suspicious_color">Suspicious Water Color/Odor</option>
                    <option value="other">Other Environmental Issue</option>
                </select>
            </div>

            <!-- Location -->
            <div>
                <label for="location" class="block text-sm font-bold text-slate-700 mb-2">Location / Coordinates</label>
                <input type="text" id="location" name="location" placeholder="e.g. Near Station ECHO-01, or GPS coordinates" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all text-slate-800" required>
            </div>

            <!-- Date and Time -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="eventDate" class="block text-sm font-bold text-slate-700 mb-2">Date of Observation</label>
                    <input type="date" id="eventDate" name="eventDate" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all text-slate-800" required>
                </div>
                <div>
                    <label for="eventTime" class="block text-sm font-bold text-slate-700 mb-2">Time of Observation</label>
                    <input type="time" id="eventTime" name="eventTime" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all text-slate-800">
                </div>
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="block text-sm font-bold text-slate-700 mb-2">Additional Details</label>
                <textarea id="description" name="description" rows="4" placeholder="Describe what you saw, extent of the issue, potential causes..." class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all text-slate-800 resize-none"></textarea>
            </div>

            <!-- Severity Level -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-3">Estimated Severity</label>
                <div class="flex gap-4">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="severity" value="low" class="peer sr-only" required>
                        <div class="px-4 py-3 text-center rounded-xl border border-slate-200 peer-checked:bg-amber-50 peer-checked:border-amber-400 peer-checked:text-amber-800 transition-all font-bold text-sm text-slate-500 hover:bg-slate-50">
                            Low
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="severity" value="medium" class="peer sr-only">
                        <div class="px-4 py-3 text-center rounded-xl border border-slate-200 peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-800 transition-all font-bold text-sm text-slate-500 hover:bg-slate-50">
                            Medium
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="severity" value="high" class="peer sr-only">
                        <div class="px-4 py-3 text-center rounded-xl border border-slate-200 peer-checked:bg-rose-50 peer-checked:border-rose-500 peer-checked:text-rose-800 transition-all font-bold text-sm text-slate-500 hover:bg-slate-50">
                            High / Critical
                        </div>
                    </label>
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 flex items-center justify-between">
                <p id="statusMessage" class="text-sm font-bold text-emerald-600 hidden">Report submitted successfully.</p>
                <button type="submit" class="ml-auto bg-primary hover:bg-sky-800 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all active:scale-95 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">send</span>
                    Submit Report
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('reportForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button[type="submit"]');
        const status = document.getElementById('statusMessage');
        const originalText = btn.innerHTML;
        
        btn.innerHTML = '<div class="loading-spinner w-4 h-4 border-2 border-white/30 border-t-white mr-2"></div> Submitting...';
        btn.disabled = true;

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        fetch('/api/submit-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            btn.innerHTML = originalText;
            btn.disabled = false;
            status.textContent = "Report submitted and added to calendar.";
            status.classList.remove('hidden');
            this.reset();
            document.getElementById('eventDate').valueAsDate = new Date();
            
            setTimeout(() => {
                status.classList.add('hidden');
            }, 5000);
        })
        .catch(err => {
            btn.innerHTML = originalText;
            btn.disabled = false;
            status.textContent = "Error submitting report.";
            status.classList.remove('text-emerald-600');
            status.classList.add('text-rose-600', 'hidden');
            status.classList.remove('hidden');
        });
    });
    
    // Set today's date automatically
    document.getElementById('eventDate').valueAsDate = new Date();
</script>
{% endblock %}
