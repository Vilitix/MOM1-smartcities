<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Cities — Nancy Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
        }

        /* ── Main map ─────────────────────────────────── */
        #map {
            width: 100vw;
            height: 100vh;
        }

        /* ── Mini-map container (bottom-right) ────────── */
        #minimap-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 260px;
            height: 200px;
            border: 3px solid rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .45);
            z-index: 1000;
            background: #1e293b;
        }

        #minimap-wrapper::before {
            content: 'Overview';
            position: absolute;
            top: 6px;
            left: 10px;
            z-index: 1001;
            font-size: 9px;
            font-weight: 600;
            color: #fff;
            background: rgba(15, 23, 42, 0.75);
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: .4px;
            pointer-events: none;
        }

        #minimap {
            width: 100%;
            height: 100%;
        }

        /* ── Custom tooltip / label styling ───────────── */
        .label-tooltip {
            background: none !important;
            border: none !important;
            color: #1e3a8a;
            font-size: 11px;
            font-weight: 700;
            padding: 0 !important;
            box-shadow: none !important;
            white-space: nowrap;
            text-shadow:
                -1px -1px 0 #fff,
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                1px 1px 0 #fff,
                0 0 5px rgba(255, 255, 255, 0.8);
        }

        .label-tooltip::before {
            display: none !important;
        }

        .label-tooltip-mini {
            background: none !important;
            border: none !important;
            color: rgba(30, 58, 138, 0.85);
            font-size: 9px;
            font-weight: 600;
            padding: 0 !important;
            box-shadow: none !important;
            white-space: nowrap;
            text-shadow: 0 0 3px #ffffff;
        }

        .label-tooltip-mini::before {
            display: none !important;
        }

        /* ── Popup styling ────────────────────────────── */
        .leaflet-popup-content-wrapper {
            background: #ffffff;
            color: #334155;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .leaflet-popup-tip {
            background: #ffffff;
        }

        .leaflet-popup-content {
            font-size: 14px;
            line-height: 1.6;
            margin: 15px;
        }

        .leaflet-popup-content h3 {
            margin: 0 0 6px;
            font-size: 16px;
            color: #2563eb;
            font-weight: 700;
        }

        /* ── Minimap marker pulsing ring ──────────────── */
        .pulse-marker {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            border: 1px solid #fff;
            box-shadow: 0 0 0 rgba(245, 158, 11, 0.6);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(245, 158, 11, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
            }
        }

        /* ── River current arrow markers ──────────────── */
        .river-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
            line-height: 0;
            filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.4));
        }

        /* ── Legend styling ───────────────────────────── */
        #map-legend {
            position: fixed;
            top: 50px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 1100;
            font-size: 11px;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            font-size: 14px;
            line-height: 1;
        }

        .legend-icon.cross {
            font-size: 18px;
            margin-top: -2px;
        }

        .legend-icon.dot {
            font-size: 18px;
        }

        .legend-icon.arrow {
            font-size: 16px;
        }
    </style>
</head>

<body>

    <!-- Main map -->
    <div id="map"></div>

    <!-- Map Legend -->
    <div id="map-legend">
        <div class="legend-item">
            <span class="legend-icon arrow" style="color: #ef4444; width: 18px; height: 18px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12,2 L19,20 L12,16 L5,20 Z" fill="#ef4444" stroke="#fff" stroke-width="1" />
                </svg>
            </span>
            <span>Water current</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon cross" style="color: #ef4444;">+</span>
            <span>Important places</span>
        </div>
        <div class="legend-item">
            <span class="legend-icon dot" style="color: #f59e0b;">●</span>
            <span>Chemical release</span>
        </div>
    </div>

    <!-- Mini-map overlay -->
    <div id="minimap-wrapper">
        <div id="minimap"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ================================================================
        //  CONFIGURATION — Edit points here
        // ================================================================

        // ── Main-map annotated points ──
        const mainPoints = [
            {
                lat: 48.69250,
                lng: 6.20275,
                label: 'Swimming spot',
                color: '#0ea5e9',
                popup: `<h3>Swimming spot</h3>
                <p>Monitored bathing zone on the Meurthe.</p>`
            },
            {
                lat: 48.69333,
                lng: 6.20525,
                label: 'Echo buoy',
                color: '#0ea5e9',
                popup: `<h3>Echo buoy</h3>
                <p>Acoustic monitoring buoy.</p>`
            },
            {
                lat: 48.64086,
                lng: 6.26772,
                label: 'Novacarb',
                color: '#f97316',
                popup: `<h3>Novacarb</h3>
                <p>Industrial site along the Meurthe.</p>`
            },
            {
                lat: 48.62822,
                lng: 6.34175,
                label: 'Solvay',
                color: '#f97316',
                popup: `<h3>Solvay</h3>
                <p>Chemical production facility.</p>`
            },
            {
                lat: 48.71189,
                lng: 6.17703,
                label: 'Sewage treatment plant',
                color: '#8b5cf6',
                popup: `<h3>Sewage treatment plant</h3>
                <p>Wastewater processing facility.</p>`
            }
        ];

        // ── North-East points (visible only on mini-map overview) ──
        const northEastPoints = [
            {
                lat: 48.64086,
                lng: 6.26772,
                label: 'Novacarb'
            },
            {
                lat: 48.62822,
                lng: 6.34175,
                label: 'Solvay'
            }
        ];

        // ================================================================
        //  MAIN MAP
        // ================================================================
        const map = L.map('map', {
            center: [48.6850, 6.2200],
            zoom: 12,
            zoomControl: true
        });

        // Tile layer — CartoDB Voyager for a clean, light look
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/">CARTO</a> · © <a href="https://osm.org/copyright">OSM</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Add scale (top right)
        L.control.scale({ position: 'topright' }).addTo(map);

        // Custom cross indicator
        function createIcon(color = '#6366f1') {
            return L.divIcon({
                className: '',
                html: `<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                         <line x1="8" y1="3" x2="8" y2="13" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
                         <line x1="3" y1="8" x2="13" y2="8" stroke="${color}" stroke-width="2" stroke-linecap="round"/>
                       </svg>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8],
                popupAnchor: [0, -10],
                tooltipAnchor: [0, -6]
            });
        }

        // Add main-map markers
        mainPoints.forEach(pt => {
            const markerColor = '#ef4444'; // Discrete red cross as requested
            const marker = L.marker([pt.lat, pt.lng], { icon: createIcon(markerColor) }).addTo(map);

            // Persistent label (discrete, no bubble)
            marker.bindTooltip(pt.label, {
                permanent: true,
                direction: 'top',
                className: 'label-tooltip',
                offset: [0, -4]
            });

            // Click popup with richer info
            if (pt.popup) {
                marker.bindPopup(pt.popup, { maxWidth: 260 });
            }
        });

        // ================================================================
        //  RIVER CURRENT ARROWS (Meurthe — south to north)
        // ================================================================

        // Approximate Meurthe river waypoints (upstream → downstream, SE to NW)
        const meurtheWaypoints = [
            [48.6320, 6.2900],
            [48.6380, 6.2720],
            [48.6420, 6.2650],
            [48.6500, 6.2500],
            [48.6570, 6.2380],
            [48.6630, 6.2260],
            [48.6700, 6.2150],
            [48.6770, 6.2080],
            [48.6850, 6.2040],
            [48.6920, 6.2020],
            [48.6980, 6.1960],
            [48.7050, 6.1880],
            [48.7120, 6.1780],
        ];

        // Meurthe river path (line removed as requested)
        /*
        L.polyline(meurtheWaypoints, {
            color: '#2563eb',
            weight: 6,
            opacity: 0.6,
            lineCap: 'round',
            lineJoin: 'round'
        }).addTo(map);
        */

        // Place manual red arrows as requested
        function createRedArrow(angleDeg, length = 32) {
            return L.divIcon({
                className: 'river-arrow',
                html: `<svg width="${length}" height="${length}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
                            style="transform: rotate(${angleDeg}deg);">
                         <path d="M12,2 L19,20 L12,16 L5,20 Z" fill="#ef4444" 
                               stroke="#ffffff" stroke-width="1"/>
                       </svg>`,
                iconSize: [length, length],
                iconAnchor: [length / 2, length / 2]
            });
        }

        // 1. Long arrow facing up (North: 0 deg) at 48°41'21.3"N 6°12'21.6"E
        L.marker([48.68925, 6.20600], {
            icon: createRedArrow(0, 48), // angle 0 = Up, length 48
            interactive: false
        }).addTo(map);

        // 2. Arrow facing left (West: -90 deg) at 48°42'00.3"N 6°12'01.3"E
        L.marker([48.70008, 6.20036], {
            icon: createRedArrow(-90, 32), // angle -90 = Left
            interactive: false
        }).addTo(map);

        // ================================================================
        //  MINI-MAP (bottom-right, unzoomed overview)
        // ================================================================
        const minimap = L.map('minimap', {
            center: [48.6700, 6.2500],
            zoom: 10,
            zoomControl: false,
            attributionControl: false,
            dragging: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            touchZoom: false,
            boxZoom: false,
            keyboard: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(minimap);

        // Add scale (minimap)
        L.control.scale({ position: 'bottomleft', maxWidth: 80 }).addTo(minimap);

        // Show ALL points on the mini-map (main + NE)
        const allMiniPoints = [...mainPoints, ...northEastPoints];

        allMiniPoints.forEach((pt, i) => {
            const isNE = i >= mainPoints.length;
            const icon = isNE
                ? L.divIcon({ className: 'pulse-marker', iconSize: [8, 8], iconAnchor: [4, 4] })
                : L.circleMarker([pt.lat, pt.lng], {
                    radius: 2,
                    color: '#2563eb',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.9,
                    weight: 1
                });

            if (isNE) {
                const m = L.marker([pt.lat, pt.lng], { icon }).addTo(minimap);
                m.bindTooltip(pt.label, {
                    permanent: true,
                    direction: 'right',
                    className: 'label-tooltip-mini',
                    offset: [8, 0]
                });
            } else {
                L.circleMarker([pt.lat, pt.lng], {
                    radius: 2,
                    color: '#2563eb',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.9,
                    weight: 1
                }).addTo(minimap);
            }
        });

        // Viewport rectangle on mini-map
        let viewRect = null;
        function updateViewRect() {
            const bounds = map.getBounds();
            if (viewRect) minimap.removeLayer(viewRect);
            viewRect = L.rectangle(bounds, {
                color: '#f59e0b',
                weight: 2,
                fill: true,
                fillColor: '#f59e0b',
                fillOpacity: 0.15,
                dashArray: '6 4'
            }).addTo(minimap);
        }
        map.on('moveend zoomend', updateViewRect);
        updateViewRect();
    </script>
</body>

</html>
